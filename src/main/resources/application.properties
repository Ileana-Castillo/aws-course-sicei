# Puerto del servidor
server.port=8080

spring.application.name=api-escolar

# Serialización JSON: no incluir campos nulos en las respuestas
spring.jackson.default-property-inclusion=non_null

# NO coercionar números a String ni viceversa.
# Esto hace que si un campo String recibe un número JSON, falle con 400.
spring.jackson.mapper.allow-coercion-of-scalars=false

# CRÍTICO: permite que rutas inexistentes lances NoHandlerFoundException (→ 404 JSON)
# en vez del comportamiento por defecto de Spring que devuelve 500.
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Mensajes de error más detallados en validaciones
server.error.include-message=always
server.error.include-binding-errors=always

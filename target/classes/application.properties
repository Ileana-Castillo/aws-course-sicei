# Puerto del servidor
server.port=8080

# Nombre de la aplicación
spring.application.name=api-escolar

# Serialización JSON: no incluir campos nulos en las respuestas
spring.jackson.default-property-inclusion=non_null

# Formato de fechas ISO 8601 (por si se agregan fechas en el futuro)
spring.jackson.serialization.write-dates-as-timestamps=false

# Mensajes de error más detallados en validaciones
server.error.include-message=always
server.error.include-binding-errors=always
